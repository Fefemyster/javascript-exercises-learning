  <body>
    <script>
      const removeFromArray = function (items, condition) {
        return items.filter((item) => {
          return item !== condition;
        });
      };

      let items = [1, 2, 3, 4, 5];

      console.log(removeFromArray(items, 4));
    </script>
  </body>
